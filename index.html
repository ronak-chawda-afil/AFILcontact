<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a18;
    --muted: #6b6b65;
    --rule: #e2e0d8;
    --bg: #f7f5ef;
    --card: #ffffff;
    --gold: #b08d57;
    --gold-light: #f0e8d6;
  }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    background: var(--card);
    max-width: 420px;
    width: 100%;
    border-radius: 2px;
    overflow: hidden;
    box-shadow: 0 2px 40px rgba(0,0,0,0.08), 0 0 0 1px var(--rule);
    animation: rise 0.6s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .header {
    background: var(--ink);
    padding: 2.5rem 2rem 2rem;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.08;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 60px;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.06;
  }

  .monogram {
    width: 56px; height: 56px;
    background: var(--gold-light);
    border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--gold);
    margin-bottom: 1.25rem;
    position: relative; z-index: 1;
    letter-spacing: 1px;
  }

  .name {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    color: #ffffff;
    line-height: 1.2;
    margin-bottom: 6px;
    position: relative; z-index: 1;
  }

  .role {
    font-size: 12px;
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    position: relative; z-index: 1;
  }

  .divider {
    height: 3px;
    background: linear-gradient(90deg, var(--gold) 0%, transparent 100%);
  }

  .body {
    padding: 1.75rem 2rem;
  }

  .label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
    font-weight: 500;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--rule);
    text-decoration: none;
    transition: gap 0.2s ease;
  }

  .contact-item:last-child { border-bottom: none; }

  .contact-item:hover { gap: 18px; }

  .icon-wrap {
    width: 40px; height: 40px;
    border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    background: var(--gold-light);
  }

  .icon-wrap svg { width: 18px; height: 18px; }

  .item-text { flex: 1; }

  .item-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }

  .item-value {
    font-size: 15px;
    color: var(--ink);
    font-weight: 400;
    margin-top: 1px;
  }

  .arrow {
    color: var(--muted);
    font-size: 16px;
    transition: transform 0.2s ease, color 0.2s ease;
  }

  .contact-item:hover .arrow {
    transform: translateX(3px);
    color: var(--gold);
  }

  .footer {
    padding: 1rem 2rem 1.5rem;
    text-align: center;
    border-top: 1px solid var(--rule);
  }

  .footer-text {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }
</style>
</head>
