<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ronak Chawda — Apollo Finvest (India) Limited</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:2rem 1rem;
    background:#f5f4f0;
    font-family:'Inter',sans-serif;
  }

  .card{
    width:100%;
    max-width:420px;
    background:#ffffff;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 8px 60px rgba(0,0,0,0.10), 0 1px 3px rgba(0,0,0,0.06);
    animation:lift .65s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes lift{
    from{opacity:0;transform:translateY(32px)}
    to{opacity:1;transform:translateY(0)}
  }

  /* ── HERO ── */
  .hero{
    position:relative;
    padding:2rem 2rem 1.5rem;
    background:#0a0a0a;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  /* subtle noise texture layer */
  .hero::before{
    content:'';
    position:absolute;inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    background-size:200px;
    pointer-events:none;
  }

  /* thin gold accent line top */
  .hero::after{
    content:'';
    position:absolute;
    top:0;left:2rem;right:2rem;
    height:1px;
    background:linear-gradient(90deg, transparent, #c9a96e 30%, #c9a96e 70%, transparent);
  }

  .avatar-ring{
    position:relative;
    width:96px;height:96px;
    border-radius:50%;
    padding:3px;
    background:linear-gradient(145deg,#c9a96e,#8a6432,#c9a96e);
    margin-bottom:1.25rem;
    z-index:1;
    flex-shrink:0;
  }

  .avatar-ring img{
    width:100%;height:100%;
    border-radius:50%;
    object-fit:cover;
    object-position:center top;
    display:block;
    border:2px solid #0a0a0a;
  }

  .hero-name{
    font-family:'Cormorant Garamond',serif;
    font-size:26px;
    font-weight:600;
    color:#ffffff;
    letter-spacing:0.02em;
    line-height:1.15;
    margin-bottom:4px;
    z-index:1;
  }

  .hero-role{
    font-size:10.5px;
    font-weight:400;
    color:#c9a96e;
    letter-spacing:0.2em;
    text-transform:uppercase;
    margin-bottom:12px;
    z-index:1;
  }

  .hero-divider{
    width:32px;height:1px;
    background:linear-gradient(90deg,transparent,rgba(201,169,110,0.6),transparent);
    margin:0 auto 12px;
    z-index:1;
  }

  .hero-company{
    font-size:12px;
    font-weight:500;
    color:rgba(255,255,255,0.75);
    letter-spacing:0.05em;
    margin-bottom:3px;
    z-index:1;
  }

  .hero-tagline{
    font-family:'Cormorant Garamond',serif;
    font-size:13px;
    font-weight:400;
    font-style:italic;
    color:rgba(255,255,255,0.35);
    letter-spacing:0.04em;
    z-index:1;
  }

  /* ── CONTACT ROWS ── */
  .contacts{
    padding:8px 0;
    background:#fff;
  }

  .row{
    display:flex;
    align-items:center;
    gap:14px;
    padding:15px 1.75rem;
    text-decoration:none;
    border-bottom:1px solid #f3f2ef;
    transition:background .15s ease;
    cursor:pointer;
  }

  .row:last-child{border-bottom:none}
  .row:hover{background:#fafaf8}

  .row-icon{
    width:40px;height:40px;
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    background:#f5f4f0;
    transition:background .15s;
  }

  .row:hover .row-icon{background:#eeecea}

  .row-icon svg{width:18px;height:18px}

  .row-text{flex:1}

  .row-label{
    font-size:10px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:#aaa;
    font-weight:500;
    margin-bottom:2px;
  }

  .row-value{
    font-size:14.5px;
    color:#111;
    font-weight:400;
    letter-spacing:0.01em;
  }

  .row-arrow{
    color:#ccc;
    font-size:18px;
    font-weight:300;
    transition:transform .15s, color .15s;
  }
  .row:hover .row-arrow{color:#888;transform:translateX(3px)}

  /* ── FOOTER ── */
  .footer{
    margin:0 1.5rem 1.5rem;
    background:#f5f4f0;
    border-radius:12px;
    padding:14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }

  .footer-info{}
  .footer-co{
    font-size:11px;
    font-weight:500;
    color:#333;
    letter-spacing:0.03em;
    line-height:1.4;
  }
  .footer-tag{
    font-size:10px;
    color:#aaa;
    letter-spacing:0.04em;
    font-style:italic;
    margin-top:1px;
  }

  .visit-btn{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:10.5px;
    font-weight:500;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:#fff;
    background:#0a0a0a;
    padding:8px 14px;
    border-radius:8px;
    text-decoration:none;
    white-space:nowrap;
    transition:background .15s;
    flex-shrink:0;
  }
  .visit-btn:hover{background:#333}
  .visit-btn svg{width:10px;height:10px}
</style>
</head>
